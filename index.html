
      <!DOCTYPE html>
      <html>
      <head>
        <title>nesthush</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Libre+Franklin:wght@400;500&display=swap" rel="stylesheet">        <style>
          body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #0D3B66;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            background: 
            url('/images/golden_final.png');
            background-size: cover;
            background-position: center;
          }

          .container {
            max-width: 500px;
            padding: 30px;
            border-radius: 16px;
            background: rgba(243, 239, 230, 0.35);
            border: 1px solid rgba(243, 239, 230, 0.25);
            backdrop-filter: blur(12px);
            }

          h1 {
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            letter-spacing: 1px;
            margin-bottom: 10px;
          }

          .accent {
            width: 60px;
            height: 3px;
            background: #0D3B66;
            margin: 20px auto;
            border-radius: 2px;
          }
            p {
              font-family: 'DM Sans', sans-serif;
              font-size: 18px;
              opacity: 0.9;
              margin-bottom: 30px;
              letter-spacing: 0.3px;
              text-shadow: 0 2px 12px rgba(0,0,0,0.4);
              
            }
          

          input {
            padding: 12px;
              width: 70%;
              border-radius: 8px;
              border: 1px solid rgba(13, 59, 102, 0.2);
              margin-bottom: 10px;
              font-size: 14px;
              outline: none;
              background: rgba(255, 255, 255, 0.6);
              color: #1F2937;
              backdrop-filter: blur(6px);
            }
            input:focus {
              border: 1px solid #0D3B66;
              box-shadow: 0 0 0 2px rgba(13, 59, 102, 0.15);
            }
            .form {
              display: flex;
              flex-direction: column;
              gap: 10px;
              align-items: center;
            }
            button {
              padding: 12px 20px;
              border: none;
              border-radius: 8px;
              background: linear-gradient(135deg, #0D3B66, #0A2E4F);
              color: white;
              font-size: 14px;
              cursor: pointer;
              transition: all 0.2s ease;
            }
            
            button:hover {
              transform: translateY(-1px);
              box-shadow: 0 6px 20px rgba(13, 59, 102, 0.35);
            }
           .feather {
              display: flex;
              justify-content: center;
              margin: 12px 0 18px 0;
            }
            
            .feather img {
              width: 90px;
              height: auto;
              opacity: 0.7;
            }

          .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
          }
        </style>
      </head>
      <body>
        <div class="container">
          <h1>nesthush</h1>
          <div class="feather">
              <img src="/images/feather.png" alt="feather" />
            </div>
            <p>Sleep like family. Coming soon.</p>

          <div class="form">
            <input placeholder="Enter your email" />
            <br/>
            <button>Notify me</button>
          </div>

          <div class="footer">
            © 2026 nesthush
          </div>
        </div>
      </body>
      </html>
