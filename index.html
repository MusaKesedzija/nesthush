
      <!DOCTYPE html>
      <html>
      <head>
        <title>nesthush</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
          body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            background: 
            linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.5)),
            url('/images/vucijak-back.png');
            background-size: cover;
            background-position: center;
          }

          .container {
            max-width: 500px;
            padding: 30px;
            backdrop-filter: blur(4px);
          }

          h1 {
            font-size: 42px;
            letter-spacing: 2px;
            margin-bottom: 10px;
          }

          .accent {
            width: 60px;
            height: 3px;
            background: #3b82f6;
            margin: 20px auto;
            border-radius: 2px;
          }

          p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
          }

          input {
            padding: 12px;
            width: 70%;
            border-radius: 6px;
            border: none;
            margin-bottom: 10px;
            font-size: 14px;
          }

          button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-size: 14px;
            cursor: pointer;
          }

          button:hover {
            background: #2563eb;
          }

          .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
          }
        </style>
      </head>
      <body>
        <div class="container">
          <h1>nesthush</h1>
          <div class="accent"></div>
          <p>Sleep like a family. Coming soon!!!</p>

          <div>
            <input placeholder="Enter your email" />
            <br/>
            <button>Notify me</button>
          </div>

          <div class="footer">
            "©" 2026 nesthush
          </div>
        </div>
      </body>
      </html>
